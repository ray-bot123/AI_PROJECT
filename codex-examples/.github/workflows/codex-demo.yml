name: Codex demo

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ask-codex:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Ask Codex for a quick project review
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          sandbox: read-only
          prompt: |
            Review this repository as a short GitHub Actions demo.

            In your final answer, include:
            - What kind of project this appears to be.
            - One concrete improvement suggestion.
            - Any obvious risk or missing setup you notice.

            Keep the response under 150 words.

      - name: Show Codex response in workflow summary
        if: steps.codex.outputs.final-message != ''
        env:
          CODEX_FINAL_MESSAGE: ${{ steps.codex.outputs.final-message }}
        run: |
          {
            echo "## Codex response"
            echo
            echo "$CODEX_FINAL_MESSAGE"
          } >> "$GITHUB_STEP_SUMMARY"
